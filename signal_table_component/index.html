<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap');
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: #f5f5f7;
      font-family: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; }
    .signal-table-wrap { margin-top: 1rem; border-top:1px solid rgba(255,255,255,.08); padding-top:1.2rem; overflow-x:auto; }
    .signal-table { width:100%; border-collapse:collapse; min-width:980px; font-family:'DM Sans', sans-serif; }
    .signal-table thead th { padding:13px 14px; text-align:left; color:#8e8e93; font-size:.72rem; font-weight:760; letter-spacing:.055em; text-transform:uppercase; border-bottom:1px solid rgba(255,255,255,.075); background:#05070d; }
    .signal-table tbody td { padding:14px; color:#e9ebef; font-size:.88rem; font-weight:560; border-bottom:1px solid rgba(255,255,255,.055); background:#05070d; vertical-align:middle; }
    .signal-table tbody tr:hover td { background:#0b0f18; }
    .signal-table .ticker { font-family:'DM Mono', monospace; color:#f5f5f7; font-weight:500; }
    .signal-table .num { font-family:'DM Mono', monospace; color:#d7dce5; font-weight:500; white-space:nowrap; }
    .signal-table .muted { color:#8e8e93; }
    .signal-badge { appearance:none; display:inline-flex; align-items:center; border-radius:999px; padding:5px 10px; font-size:.76rem; font-weight:760; border:1px solid rgba(255,255,255,.09); background:rgba(255,255,255,.045); color:#e9ebef; white-space:nowrap; font-family:'DM Sans', sans-serif; cursor:pointer; }
    .signal-badge.strong { background:rgba(255,107,122,.12); color:#ffb6bf; border-color:rgba(255,107,122,.22); }
    .signal-badge:hover, .signal-badge:focus-visible, .signal-badge.active { border-color:rgba(47,128,255,.68); outline:none; box-shadow:inset 0 0 0 1px rgba(47,128,255,.14); }
    .type-badge { color:#9fb6d9; font-size:.78rem; font-weight:720; }
    .puddle-text { color:#b7bcc7; min-width:220px; max-width:330px; line-height:1.34; }
    .empty-note { color:#8e8e93; padding:1.2rem 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const Streamlit = {
      ready() {
        window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
      },
      setFrameHeight(height) {
        window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setFrameHeight", height }, "*");
      },
      setComponentValue(value) {
        window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setComponentValue", value, dataType: "json" }, "*");
      }
    };

    let currentArgs = {};

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function resizeFrame() {
      const root = document.getElementById("root");
      const height = Math.ceil(root.getBoundingClientRect().height);
      Streamlit.setFrameHeight(Math.max(1, height));
    }

    function scheduleResize() {
      resizeFrame();
      window.requestAnimationFrame(() => {
        resizeFrame();
        window.requestAnimationFrame(resizeFrame);
      });
    }

    function selectSignal(button) {
      document.querySelectorAll(".signal-badge.active").forEach((el) => {
        el.classList.remove("active");
        el.setAttribute("aria-pressed", "false");
      });
      button.classList.add("active");
      button.setAttribute("aria-pressed", "true");
      Streamlit.setComponentValue({
        ticker: button.dataset.ticker,
        signal: button.dataset.signal,
        nonce: Date.now()
      });
    }

    function renderRow(row) {
      const signal = row.signal || "";
      const ticker = row.ticker || "";
      const isStrong = signal === "RSI & Puddle";
      const isActive = ticker.toUpperCase() === String(currentArgs.selected_ticker || "").toUpperCase();
      return `
        <tr>
          <td><span class="type-badge">${escapeHtml(row.asset_type)}</span></td>
          <td class="muted">${escapeHtml(row.index)}</td>
          <td class="num">${escapeHtml(row.rank)}</td>
          <td><span class="ticker">${escapeHtml(ticker)}</span></td>
          <td>${escapeHtml(row.company)}</td>
          <td>
            <button
              class="signal-badge${isStrong ? " strong" : ""}${isActive ? " active" : ""}"
              type="button"
              data-ticker="${escapeHtml(ticker)}"
              data-signal="${escapeHtml(signal)}"
              aria-pressed="${isActive ? "true" : "false"}"
            >${escapeHtml(signal)}</button>
          </td>
          <td class="num">${escapeHtml(row.price)}</td>
          <td class="num">${escapeHtml(row.change)}</td>
          <td class="num">${escapeHtml(row.rsi)}</td>
          <td class="puddle-text">${escapeHtml(row.puddle)}</td>
        </tr>
      `;
    }

    function render(args) {
      currentArgs = args || {};
      const rows = currentArgs.rows || [];
      if (!rows.length) {
        document.getElementById("root").innerHTML = `
          <div class="signal-table-wrap"><div class="empty-note">No signals match the selected filters.</div></div>
        `;
        scheduleResize();
        return;
      }

      document.getElementById("root").innerHTML = `
        <div class="signal-table-wrap">
          <table class="signal-table">
            <thead>
              <tr>
                <th>Type</th><th>Index</th><th>Rank</th><th>Ticker</th><th>Company</th>
                <th>Signal</th><th>Price</th><th>Change</th><th>RSI</th><th>Puddle</th>
              </tr>
            </thead>
            <tbody>${rows.map(renderRow).join("")}</tbody>
          </table>
        </div>
      `;

      document.querySelectorAll(".signal-badge").forEach((button) => {
        button.addEventListener("click", () => selectSignal(button));
      });
      scheduleResize();
    }

    window.addEventListener("message", (event) => {
      if (event.data.type !== "streamlit:render") {
        return;
      }
      render(event.data.args);
    });

    window.addEventListener("resize", resizeFrame);
    Streamlit.ready();
  </script>
</body>
</html>
